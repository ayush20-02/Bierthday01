<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Love Letter ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff5f9e,#ffc371);
font-family:'Dancing Script',cursive;
color:white;
text-align:center;
padding:20px;
}

.letter{
font-size:32px;
max-width:800px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="letter" id="text"></div>

<script>

const message = `Happy Birthday My Love ❤️

From the moment you entered my life,
everything became more beautiful.

Your smile brightens my darkest days,
your laugh is my favorite sound,
and your love is the greatest gift I have ever received.

You are my today,
my tomorrow,
and my forever.

Happy Birthday my beautiful girl 💖`

let i=0

function type(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(type,40)

}

}

type()

</script>

</body>
</html>
