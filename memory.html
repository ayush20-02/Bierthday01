<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#ff5f9e,#ffc371);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,220px);
gap:30px;
}

.memory-card{
width:220px;
height:260px;
border-radius:18px;
overflow:hidden;
background:white;
color:#333;
cursor:pointer;
transition:0.5s;
}

.memory-card:hover{
transform:scale(1.1) rotateY(10deg);
}

.memory-img{
width:100%;
height:170px;
object-fit:cover;
}

.memory-caption{
padding:12px;
font-size:14px;
text-align:center;
}

button{
margin-top:40px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff006a;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Our Beautiful Memories 📸</h1>

<div class="gallery">

<div class="memory-card">
<img src="public/photos/photo1.jpg" class="memory-img">
<div class="memory-caption">The day my heart chose you forever ❤️</div>
</div>

<div class="memory-card">
<img src="public/photos/photo2.jpg" class="memory-img">
<div class="memory-caption">Your smile makes my world brighter 😊</div>
</div>

<div class="memory-card">
<img src="public/photos/photo3.jpg" class="memory-img">
<div class="memory-caption">Every moment with you is magical ✨</div>
</div>

<div class="memory-card">
<img src="public/photos/photo4.jpg" class="memory-img">
<div class="memory-caption">I would choose you again and again 💕</div>
</div>

<div class="memory-card">
<img src="public/photos/photo5.jpg" class="memory-img">
<div class="memory-caption">You are my happiness 🌹</div>
</div>

<div class="memory-card">
<img src="public/photos/photo6.jpg" class="memory-img">
<div class="memory-caption">My heart belongs to you forever 💖</div>
</div>

</div>

<button onclick="next()">Next Surprise 🎂</button>

<script>
function next(){
window.location.href="cake.html"
}
</script>

</body>
</html>
