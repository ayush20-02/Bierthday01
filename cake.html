<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Cake 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#111;
color:white;
font-family:Pacifico;
text-align:center;
overflow:hidden;
}

.cake{
margin-top:40px;
position:relative;
}

.layer{
width:200px;
height:60px;
background:#ff8fab;
border-radius:10px;
margin:5px auto;
}

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
left:95px;
top:-40px;
}

.flame{
width:15px;
height:15px;
background:orange;
border-radius:50%;
position:absolute;
top:-15px;
left:-2px;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

button{
margin-top:40px;
padding:15px 40px;
border:none;
border-radius:30px;
background:#ff006a;
color:white;
font-size:18px;
cursor:pointer;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<h1>Make a Wish 🎂</h1>

<div class="cake">

<div class="candle">
<div class="flame" id="flame"></div>
</div>

<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>

</div>

<button onclick="blow()">Blow Candle 🕯</button>

<canvas id="canvas"></canvas>

<script>

function blow(){

document.getElementById("flame").style.display="none"

setTimeout(()=>{
window.location.href="love.html"
},4000)

}

</script>

</body>
</html>
